<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>spmt.live — Sign In</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #050505; color: #fff; font-family: system-ui, -apple-system, sans-serif; }
    .card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 2.5rem; width: 100%; max-width: 380px; backdrop-filter: blur(20px); }
    h1 { font-size: 1.5rem; font-weight: 800; text-align: center; margin-bottom: 0.25rem; }
    h1 span { color: #f97316; }
    .subtitle { text-align: center; font-size: 0.7rem; color: #71717a; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 2rem; }
    .tabs { display: flex; gap: 0; margin-bottom: 1.5rem; border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
    .tabs button { flex: 1; padding: 0.6rem; background: transparent; border: none; color: #a1a1aa; font-weight: 700; font-size: 0.75rem; cursor: pointer; transition: all 0.2s; }
    .tabs button.active { background: rgba(249,115,22,0.15); color: #f97316; }
    input { width: 100%; padding: 0.75rem 1rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; font-size: 0.8rem; margin-bottom: 0.75rem; outline: none; transition: border-color 0.2s; }
    input:focus { border-color: rgba(249,115,22,0.5); }
    input::placeholder { color: #52525b; }
    .btn { width: 100%; padding: 0.75rem; background: #f97316; border: none; border-radius: 12px; color: #000; font-weight: 800; font-size: 0.8rem; cursor: pointer; transition: transform 0.1s; }
    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .msg { text-align: center; font-size: 0.7rem; margin-top: 1rem; min-height: 1.2rem; }
    .msg.error { color: #ef4444; }
    .msg.success { color: #10b981; }
    .footer { text-align: center; margin-top: 1.5rem; font-size: 0.6rem; color: #3f3f46; }
  </style>
</head>
<body>
  <div class="card">
    <h1><span>spmt</span>.live</h1>
    <p class="subtitle">universal account system</p>

    <div class="tabs">
      <button id="tab-login" class="active" onclick="showTab('login')">Sign In</button>
      <button id="tab-register" onclick="showTab('register')">Create Account</button>
    </div>

    <form id="form-login" onsubmit="handleLogin(event)">
      <input name="username" placeholder="username or user@spmt.live" required>
      <input name="password" type="password" placeholder="password" required>
      <button type="submit" class="btn">Sign In</button>
    </form>

    <form id="form-register" style="display:none" onsubmit="handleRegister(event)">
      <input name="username" placeholder="choose a username" required>
      <input name="displayName" placeholder="display name (optional)">
      <input name="discordUsername" placeholder="Discord username" required>
      <input name="twitchUsername" placeholder="Twitch username (optional)">
      <input name="password" type="password" placeholder="password (min 6 chars)" required minlength="6">
      <button type="submit" class="btn">Create Account</button>
    </form>

    <p class="msg" id="msg"></p>
    <p class="footer">Your handle will be username@spmt.live</p>

    <!-- Link accounts section (shown after login) -->
    <div id="link-section" style="display:none; margin-top:1.5rem; padding-top:1.5rem; border-top:1px solid rgba(255,255,255,0.1)">
      <p style="font-size:0.7rem; color:#71717a; text-align:center; margin-bottom:1rem; letter-spacing:0.1em; text-transform:uppercase;">Link Your Accounts</p>
      <input id="link-discord" placeholder="Discord username" style="width:100%; padding:0.75rem 1rem; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:12px; color:#fff; font-size:0.8rem; margin-bottom:0.75rem; outline:none;">
      <input id="link-twitch" placeholder="Twitch username" style="width:100%; padding:0.75rem 1rem; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:12px; color:#fff; font-size:0.8rem; margin-bottom:0.75rem; outline:none;">
      <button onclick="handleLink()" class="btn">Link Accounts</button>
      <p class="msg" id="link-msg"></p>
    </div>
  </div>

  <script>
    let authToken = null;

    function showTab(tab) {
      document.getElementById('form-login').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('form-register').style.display = tab === 'register' ? 'block' : 'none';
      document.getElementById('tab-login').className = tab === 'login' ? 'active' : '';
      document.getElementById('tab-register').className = tab === 'register' ? 'active' : '';
      document.getElementById('msg').textContent = '';
    }

    async function handleLogin(e) {
      e.preventDefault();
      const form = new FormData(e.target);
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: form.get('username'), password: form.get('password') })
      });
      const data = await res.json();
      const msg = document.getElementById('msg');
      if (res.ok) {
        authToken = data.token;
        msg.className = 'msg success';
        msg.textContent = `Welcome back, ${data.user.displayName}! (${data.user.email})`;
        document.getElementById('link-section').style.display = 'block';
      } else {
        msg.className = 'msg error';
        msg.textContent = data.error;
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const form = new FormData(e.target);
      const res = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: form.get('username'), displayName: form.get('displayName'), discordUsername: form.get('discordUsername'), twitchUsername: form.get('twitchUsername'), password: form.get('password') })
      });
      const data = await res.json();
      const msg = document.getElementById('msg');
      if (res.ok) {
        authToken = data.token;
        msg.className = 'msg success';
        msg.textContent = `Account created! You are ${data.user.email}`;
        document.getElementById('link-section').style.display = 'block';
      } else {
        msg.className = 'msg error';
        msg.textContent = data.error;
      }
    }

    async function handleLink() {
      const discord = document.getElementById('link-discord').value.trim();
      const twitch = document.getElementById('link-twitch').value.trim();
      const msg = document.getElementById('link-msg');
      if (!discord) { msg.className = 'msg error'; msg.textContent = 'Discord username is required'; return; }
      if (!authToken) { msg.className = 'msg error'; msg.textContent = 'Please log in first'; return; }
      const res = await fetch('/api/user/link', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + authToken },
        body: JSON.stringify({ discordUsername: discord, twitchUsername: twitch })
      });
      const data = await res.json();
      if (res.ok) {
        msg.className = 'msg success';
        const parts = [];
        if (data.discordId) parts.push('Discord: ' + data.discordUsername + ' (' + data.discordId + ')');
        else if (data.discordUsername) parts.push('Discord: ' + data.discordUsername + ' (ID pending - bot may need access)');
        if (data.twitchId) parts.push('Twitch: ' + data.twitchUsername + ' (' + data.twitchId + ')');
        else if (data.twitchUsername) parts.push('Twitch: ' + data.twitchUsername + ' (ID pending)');
        msg.textContent = parts.length ? 'Linked! ' + parts.join(' | ') : 'Saved!';
      } else {
        msg.className = 'msg error';
        msg.textContent = data.error || 'Link failed';
      }
    }
  </script>
</body>
</html>
